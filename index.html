<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night & Day | Film Positioning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #030303;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto; 
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        /* Cinematic Vignette Overlay */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%);
            z-index: 2;
            pointer-events: none;
        }

        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: block;
        }

        .scroll-container {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 600vh;
            pointer-events: none; 
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            box-sizing: border-box;
        }

        @media (min-width: 640px) {
            .ui-layer {
                padding: 2.5rem;
            }
        }

        .title-brand {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        .scroll-indicator {
            align-self: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
            transition: opacity 0.5s ease;
            margin-bottom: 1rem;
        }

        .mouse-icon {
            width: 20px;
            height: 32px;
            border: 2px solid white;
            border-radius: 12px;
            position: relative;
        }

        .mouse-wheel {
            width: 4px;
            height: 6px;
            background: white;
            border-radius: 2px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollWheel 1.5s infinite;
        }

        @keyframes scrollWheel {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 10px); opacity: 0; }
        }

        /* Progress Bar */
        .progress-container {
            position: fixed;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            height: 30vh;
            width: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 4;
        }

        .progress-bar {
            width: 100%;
            background: #8ac53f;
            height: 0%;
            box-shadow: 0 0 10px rgba(138,197,63,0.5);
            transition: height 0.1s ease-out;
        }

        /* Cassette Details UI */
        #cassette-details {
            position: fixed;
            bottom: -250px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(14, 14, 14, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.5rem;
            width: 90%;
            max-width: 450px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }

        @media (min-width: 640px) {
            #cassette-details {
                width: auto;
                max-width: none;
                padding: 2rem 4rem;
                border-bottom-left-radius: 0;
                border-bottom-right-radius: 0;
                border-radius: 16px 16px 0 0;
            }
        }

        #cassette-details.visible {
            bottom: 1.5rem;
        }

        @media (min-width: 640px) {
            #cassette-details.visible {
                bottom: 0;
            }
        }

        /* Footer Section */
        .footer-section {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, transparent, #030303 30%);
            pointer-events: auto;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased selection:bg-[#8ac53f] selection:text-black">

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <h1 class="text-xs tracking-[0.3em] font-light text-gray-300">INITIALIZING SCENE</h1>
    </div>

    <div class="vignette"></div>

    <canvas id="webgl-canvas"></canvas>

    <!-- Scrollable Area -->
    <div class="scroll-container"></div>

    <!-- Static UI Layer -->
    <div class="ui-layer">
        <header id="main-header" class="flex flex-row items-center justify-between sm:justify-center gap-2 sm:gap-12 md:gap-16 w-full pointer-events-auto py-2 transition-opacity duration-1000 opacity-0 px-2 sm:px-0">
            <!-- Left Navigation Group -->
            <div id="nav-left" class="flex items-center gap-3 sm:gap-8 md:gap-12 transition-opacity duration-500">
                <a href="#projects" class="text-[9px] sm:text-xs md:text-sm tracking-[0.2em] sm:tracking-[0.25em] text-white uppercase font-semibold hover:text-[#8ac53f] transition-all duration-300 hover:tracking-[0.3em] whitespace-nowrap" onclick="window.scrollTo({top: (document.body.scrollHeight - window.innerHeight) * 0.15, behavior: 'smooth'}); return false;">
                    Projects
                </a>
                <a href="#services" class="text-[9px] sm:text-xs md:text-sm tracking-[0.2em] sm:tracking-[0.25em] text-white uppercase font-semibold hover:text-[#8ac53f] transition-all duration-300 hover:tracking-[0.3em] whitespace-nowrap">
                    Services
                </a>
            </div>
            
            <!-- Centralized Logo Container -->
            <div id="nav-logo-container" class="flex justify-center items-center px-2 sm:px-10 transition-opacity duration-500 max-w-[40%] sm:max-w-none">
                <img id="header-logo" src="ndw logo 00.png" alt="NIGHT & DAY" 
                     class="h-[3.5rem] sm:h-[7.8rem] md:h-[10.4rem] w-auto max-w-full object-contain transition-all duration-700 hover:scale-105 active:scale-95" 
                     onerror="this.onerror=null; this.src=''; this.alt='NIGHT & DAY'; this.className='text-[1rem] sm:text-[1.8rem] md:text-[2.2rem] tracking-[0.3em] font-serif uppercase text-white font-bold transition-opacity duration-700 hover:text-[#8ac53f] px-2 text-center whitespace-nowrap';">
            </div>

            <!-- Right Navigation Group -->
            <div id="nav-right" class="flex items-center gap-3 sm:gap-8 md:gap-12 transition-opacity duration-500">
                <a href="#team" class="text-[9px] sm:text-xs md:text-sm tracking-[0.2em] sm:tracking-[0.25em] text-white uppercase font-semibold hover:text-[#8ac53f] transition-all duration-300 hover:tracking-[0.3em] whitespace-nowrap">
                    Team
                </a>
                <a href="#about" class="text-[9px] sm:text-xs md:text-sm tracking-[0.2em] sm:tracking-[0.25em] text-white uppercase font-semibold hover:text-[#8ac53f] transition-all duration-300 hover:tracking-[0.3em] whitespace-nowrap">
                    About Us
                </a>
            </div>
        </header>

        <!-- Handwritten Intro Text Overlay -->
        <div id="intro-handwritten-text-container" class="absolute inset-x-0 top-[12%] sm:top-[8%] flex flex-col items-center justify-center pointer-events-none z-[5]">
            <p id="intro-text-1" class="text-white text-lg sm:text-2xl md:text-4xl lg:text-5xl font-light tracking-widest text-center px-6 transition-opacity duration-300" style="font-family: 'Caveat', cursive;">
                it all begins with a dot
            </p>
        </div>
        
        <div class="scroll-indicator" id="scroll-hint">
            <div class="mouse-icon" id="hint-icon"><div class="mouse-wheel"></div></div>
            <span class="text-[0.6rem] sm:text-[0.65rem] tracking-[0.25em] sm:tracking-[0.3em] uppercase text-center" id="hint-text">Scroll to explore</span>
        </div>

        <!-- Campaign Hint -->
        <div id="campaign-hint" class="absolute bottom-[14%] sm:bottom-[10%] left-1/2 transform -translate-x-1/2 text-[0.6rem] sm:text-[0.65rem] tracking-[0.2em] text-gray-300 uppercase opacity-0 transition-opacity duration-700 pointer-events-none text-center drop-shadow-md w-full px-4">
            Tap a cassette for details
        </div>
    </div>

    <!-- Scroll Progress -->
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Dynamic Cassette Details -->
    <div id="cassette-details">
        <h3 id="cd-title" class="font-serif text-xl sm:text-2xl tracking-[0.15em] text-white mb-2 sm:mb-3 uppercase">Title</h3>
        <p id="cd-activities" class="text-xs sm:text-sm tracking-wider text-gray-400 font-light"></p>
    </div>

    <!-- Final Footer Section -->
    <div class="footer-section">
        <button class="px-8 py-4 sm:px-10 sm:py-5 bg-white text-black font-bold tracking-[0.2em] text-xs sm:text-sm uppercase rounded-full hover:scale-105 hover:shadow-[0_0_25px_rgba(138,197,63,0.4)] transition-all duration-300 active:scale-95">
            Connect With Us
        </button>
    </div>

    <script>
        window.onload = function() {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            
            // Adjust visual hints for mobile touch interactions
            if(isTouchDevice) {
                const hintText = document.getElementById('hint-text');
                const hintIcon = document.getElementById('hint-icon');
                const campaignHint = document.getElementById('campaign-hint');
                if(hintText) hintText.innerText = "Swipe to explore";
                if(hintIcon) hintIcon.style.display = "none";
                if(campaignHint) campaignHint.innerText = "Tap a cassette for details";
            }

            // Loader hand-off
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.visibility = 'hidden', 1000);
            }, 800);

            // Three.js Core Setup
            const canvas = document.getElementById('webgl-canvas');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030303, 0.012);

            const CONFIG = {
                introLogoText: "NIGHT & DAY",
                introLogoImage: "ndw logo 00.png",
                finalPitchText: "NIGHT & DAY",
                finalPitchImage: "ndw logo 00.png",
                fontPrimary: '"Inter", sans-serif',
                fontSecondary: '"Cinzel", serif'
            };

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = !isTouchDevice; // Disable shadows on touch to maximize frames
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;

            // Highly performant, dynamic texture builder
            function createTextTexture(title, width, height, bgColor, textColor, isSpine = false, isGlow = false) {
                // Lower texture map size slightly on mobile for rendering optimization
                const scale = window.innerWidth < 640 ? 0.5 : 1;
                const canvasW = width * scale;
                const canvasH = height * scale;

                const ctxCanvas = document.createElement('canvas');
                ctxCanvas.width = canvasW;
                ctxCanvas.height = canvasH;
                const ctx = ctxCanvas.getContext('2d');

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvasW, canvasH);

                if (bgColor !== 'transparent') {
                    for(let i=0; i< (canvasW*canvasH)*0.03; i++) {
                        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)';
                        ctx.fillRect(Math.random()*canvasW, Math.random()*canvasH, 1, 1);
                    }
                }

                ctx.fillStyle = textColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (isGlow) {
                    ctx.shadowColor = textColor;
                    ctx.shadowBlur = 30 * scale;
                    ctx.font = `bold ${70 * scale}px ${CONFIG.fontSecondary}`;
                } else {
                    ctx.font = isSpine ? `bold ${28 * scale}px ${CONFIG.fontPrimary}` : `900 ${64 * scale}px ${CONFIG.fontPrimary}`;
                }

                if (isSpine) {
                    ctx.save();
                    ctx.translate(canvasW / 2, canvasH / 2);
                    ctx.rotate(-Math.PI / 2);
                    ctx.fillText(title, 0, 0);
                    ctx.restore();
                    
                    ctx.font = `${11 * scale}px Arial`;
                    ctx.fillText('N&D', canvasW / 2, canvasH - (20 * scale));
                } else {
                    if (!isGlow && bgColor !== 'transparent') {
                        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(10, 10, canvasW - 20, canvasH - 20);
                        ctx.fillText(title, canvasW / 2, canvasH / 2 - (20 * scale));
                        
                        ctx.font = `300 ${12 * scale}px "Inter", sans-serif`;
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.fillText('A NIGHT & DAY STUDIOS PRODUCTION', canvasW / 2, canvasH / 2 + (40 * scale));
                    } else {
                        ctx.fillText(title, canvasW / 2, canvasH / 2);
                    }
                }

                const texture = new THREE.CanvasTexture(ctxCanvas);
                texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 4);
                return texture;
            }

            const textureLoader = new THREE.TextureLoader();
            const shelfGroup = new THREE.Group();
            scene.add(shelfGroup);

            const films = [
                { title: 'YOUTH', color: '#8c593b', coverImage: "youth poster ndw.jpg", activities: "Global Strategy • Audience Building • Trailer Positioning" },
                { title: 'LOVE TODAY', color: '#1a1a1a', coverImage: "love today poster ndw.jpg", activities: "Digital Campaigns • IMAX Partnerships • Cultural Relevance" },
                { title: 'BLAST', color: '#2a3b2c', coverImage: "blast poster ndw.jpg", activities: "Word of Mouth • Press Narrative • Oscar Campaign Strategy" },
                { title: 'PARASAKTHI', color: '#0d1321', coverImage: "parasakthi poster ndw.jpg", activities: "Brand Partnerships • Data Analytics • Influencer Network" },
                { title: 'YOUTH', color: '#4a0e0e', coverImage: "youth poster ndw.jpg", activities: "Creative Direction • Meme Marketing • Global Scale Rollout" },
                { title: 'RETRO', color: '#421a42', coverImage: "retro poster ndw.jpg", activities: "Viral Marketing • Community Engagement • Award Strategy" },
                { title: 'BLAST', color: '#8a2b5b', coverImage: "blast poster ndw.jpg", activities: "Brand Collaborations • Social Dominance • Event Activations" },
                { title: 'PARASAKTHI', color: '#7a3e14', coverImage: "parasakthi poster ndw.jpg", activities: "Teaser Campaign • Visual Storytelling • Niche Targeting" }
            ];

            const cassettes = [];
            const cassetteWidth = 0.7;
            const cassetteHeight = 4.2;
            const cassetteDepth = 2.8;
            const spacing = 1.0;
            const startX = -((films.length - 1) * spacing) / 2;

            const plasticMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a, roughness: 0.8, metalness: 0.3, transparent: true, opacity: 0
            });

            films.forEach((film, index) => {
                const geometry = new THREE.BoxGeometry(cassetteWidth, cassetteHeight, cassetteDepth);
                let spineTexture = createTextTexture(film.title, 128, 512, '#111', '#ffffff', true);
                let coverTexture = createTextTexture(film.title, 512, 768, film.color, '#ffffff', false);

                if (film.coverImage) {
                    textureLoader.load(film.coverImage, (tex) => {
                        coverMaterial.map = tex;
                        coverMaterial.needsUpdate = true;
                    }, undefined, (err) => {
                        console.warn("Falling back to text-generated textures.");
                    });
                }

                const spineMaterial = new THREE.MeshStandardMaterial({ map: spineTexture, roughness: 0.4, transparent: true, opacity: 0 });
                const coverMaterial = new THREE.MeshStandardMaterial({ map: coverTexture, roughness: 0.3, transparent: true, opacity: 0 });
                const materials = [ coverMaterial, plasticMaterial, plasticMaterial, plasticMaterial, spineMaterial, plasticMaterial ];

                const cassette = new THREE.Mesh(geometry, materials);
                const xPos = startX + (index * spacing);
                cassette.position.set(xPos, 0, 0);
                
                cassette.userData = {
                    baseX: xPos, baseY: 0, baseZ: 0, baseRotY: 0,
                    state: 'idle', title: film.title, activities: film.activities
                };

                shelfGroup.add(cassette);
                cassettes.push(cassette);
            });

            // Shelf Base Model
            const shelfGeo = new THREE.BoxGeometry(14, 0.2, 4);
            const shelfMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9, transparent: true, opacity: 0 });
            const shelfMesh = new THREE.Mesh(shelfGeo, shelfMat);
            shelfMesh.position.set(0, -2.2, 0);
            shelfGroup.add(shelfMesh);

            // Intro portal plane elements
            const introBgGeo = new THREE.PlaneGeometry(50, 7);
            const introBgMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1.0 }); 
            const introBgPlane = new THREE.Mesh(introBgGeo, introBgMat);
            introBgPlane.position.set(0, 0, 30); 
            scene.add(introBgPlane);

            const dotGeo = new THREE.CircleGeometry(0.3, 32);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0x030303, transparent: true, opacity: 1.0 });
            const dotMesh = new THREE.Mesh(dotGeo, dotMat);
            dotMesh.position.set(0, 0, 30.1); 
            scene.add(dotMesh);

            const services = [
                { text: "Strategy & Positioning" }, { text: "Digital Campaigns" }, { text: "Cultural Relevance" }, 
                { text: "Audience Building" }, { text: "Data Analytics" }, { text: "Creative Direction" }, 
                { text: "Influencer Network" }, { text: "Brand Partnerships" }, { text: "Global Scale" }
            ];

            const textPlanes = [];
            services.forEach((service, i) => {
                let mat = new THREE.MeshBasicMaterial({ transparent: true, depthWrite: false, opacity: 0 });
                const geo = new THREE.PlaneGeometry(12, 3);
                const plane = new THREE.Mesh(geo, mat);
                mat.map = createTextTexture(service.text, 1024, 256, 'transparent', 'rgba(255,255,255,0.85)', false);
                
                const zPos = -15 - (i * 12);
                const angle = i * Math.PI * 0.7;
                const radius = window.innerWidth < 640 ? 4 + Math.random() * 3 : 6 + Math.random() * 6;
                const xPos = Math.cos(angle) * radius;
                const yPos = Math.sin(angle) * radius * 0.5;
                
                plane.position.set(xPos, yPos, zPos);
                plane.lookAt(0, 0, zPos + 10);
                scene.add(plane);
                textPlanes.push({ mesh: plane, baseY: yPos, targetY: yPos });
            });

            // Optimized dynamic starfield counts
            const starCount = window.innerWidth < 640 ? 250 : 500;
            const starGeo = new THREE.BoxGeometry(0.04, 0.04, 2);
            const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
            const starMesh = new THREE.InstancedMesh(starGeo, starMat, starCount);
            
            const dummy = new THREE.Object3D();
            const starData = [];
            for(let i=0; i<starCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 2 + Math.random() * 20;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const z = -Math.random() * 200;
                starData.push({x, y, z, speed: 0.5 + Math.random() * 0.8});
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                starMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(starMesh);

            let pitchMat = new THREE.MeshBasicMaterial({ transparent: true, blending: THREE.AdditiveBlending, opacity: 0 });
            const pitchGeo = new THREE.PlaneGeometry(30, 7.5);
            const pitchPlane = new THREE.Mesh(pitchGeo, pitchMat);
            pitchPlane.userData = { baseScaleX: 1.0, baseScaleY: 1.0 };

            if (CONFIG.finalPitchImage) {
                textureLoader.load(CONFIG.finalPitchImage, (tex) => {
                    pitchMat.map = tex;
                    pitchMat.needsUpdate = true;
                    const imgAspect = tex.image.width / tex.image.height;
                    const targetHeight = 30 / imgAspect;
                    pitchPlane.userData.baseScaleY = targetHeight / 7.5;
                    pitchPlane.scale.set(pitchPlane.userData.baseScaleX, pitchPlane.userData.baseScaleY, 1.0);
                }, undefined, () => {
                    pitchMat.map = createTextTexture(CONFIG.finalPitchText, 2048, 512, 'transparent', '#ffffff', false, true);
                });
            } else {
                pitchMat.map = createTextTexture(CONFIG.finalPitchText, 2048, 512, 'transparent', '#ffffff', false, true);
            }
            pitchPlane.position.set(0, 0, -140);
            scene.add(pitchPlane);

            scene.add(new THREE.AmbientLight(0xffffff, 0.15));
            const spotLight = new THREE.SpotLight(0xffffff, 2.0);
            spotLight.position.set(5, 10, 10);
            scene.add(spotLight);

            const rimLight = new THREE.PointLight(0x8ac53f, 2.5, 30);
            rimLight.position.set(-6, -2, -5);
            scene.add(rimLight);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            const progressBar = document.getElementById('progress-bar');
            const scrollHint = document.getElementById('scroll-hint');
            const cdUI = document.getElementById('cassette-details');
            const cdTitle = document.getElementById('cd-title');
            const cdActivities = document.getElementById('cd-activities');

            function updateMouseCoords(clientX, clientY) {
                mouse.x = (clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            }

            window.addEventListener('mousemove', (e) => {
                if (isTouchDevice) return;
                updateMouseCoords(e.clientX, e.clientY);
                handleHoverState();
            });

            function handleHoverState() {
                if (scrollProgress >= 0.1 && scrollProgress < 0.3) {
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects(cassettes);
                    cassettes.forEach(c => { if (c.userData.state === 'hover') c.userData.state = 'idle'; });
                    if (intersects.length > 0) {
                        document.body.style.cursor = 'pointer';
                        if (intersects[0].object.userData.state !== 'active') {
                            intersects[0].object.userData.state = 'hover';
                        }
                    } else {
                        document.body.style.cursor = 'default';
                    }
                }
            }

            // Unified action wrapper for tap/click interactions
            function performInteraction(clientX, clientY) {
                if (scrollProgress < 0.1 || scrollProgress > 0.3) return;
                updateMouseCoords(clientX, clientY);
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(cassettes);

                if (intersects.length > 0) {
                    const clicked = intersects[0].object;
                    if (clicked.userData.state === 'active') {
                        clicked.userData.state = 'idle';
                        cdUI.classList.remove('visible');
                    } else {
                        cassettes.forEach(c => c.userData.state = 'idle');
                        clicked.userData.state = 'active';
                        cdTitle.innerText = clicked.userData.title;
                        cdActivities.innerText = clicked.userData.activities;
                        cdUI.classList.add('visible');
                    }
                } else {
                    cassettes.forEach(c => c.userData.state = 'idle');
                    cdUI.classList.remove('visible');
                }
            }

            window.addEventListener('click', (e) => {
                if(isTouchDevice) return;
                performInteraction(e.clientX, e.clientY);
            });

            window.addEventListener('pointerdown', (e) => {
                if(!isTouchDevice) return;
                performInteraction(e.clientX, e.clientY);
            });

            let scrollProgress = 0;
            let targetScrollProgress = 0;

            window.addEventListener('scroll', () => {
                const maxScroll = document.body.scrollHeight - window.innerHeight;
                targetScrollProgress = Math.max(0, Math.min(1, window.scrollY / maxScroll));
                progressBar.style.height = `${targetScrollProgress * 100}%`;
                scrollHint.style.opacity = targetScrollProgress > 0.02 ? '0' : '0.8';
            }, { passive: true });

            function adaptToViewport() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            window.addEventListener('resize', adaptToViewport);
            adaptToViewport();

            function lerp(start, end, factor) { return start + (end - start) * factor; }

            const clock = new THREE.Clock();
            let lastScrollProgress = 0;
            let currentStarStretch = 1;

            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();

                scrollProgress = lerp(scrollProgress, targetScrollProgress, 0.08);
                const scrollDelta = Math.abs(scrollProgress - lastScrollProgress);
                lastScrollProgress = scrollProgress;

                // UI Elements state changes
                const header = document.getElementById('main-header');
                const navLeft = document.getElementById('nav-left');
                const navRight = document.getElementById('nav-right');
                const logoContainer = document.getElementById('nav-logo-container');

                if (header && navLeft && navRight && logoContainer) {
                    if (scrollProgress < 0.09) {
                        header.style.opacity = '0';
                        header.style.pointerEvents = 'none';
                    } else if (scrollProgress >= 0.09 && scrollProgress < 0.28) {
                        header.style.opacity = '1';
                        header.style.pointerEvents = 'auto';
                        navLeft.style.opacity = '1';
                        navRight.style.opacity = '1';
                        logoContainer.style.opacity = '1';
                    } else if (scrollProgress >= 0.28 && scrollProgress < 0.85) {
                        header.style.opacity = '0';
                        header.style.pointerEvents = 'none';
                    } else {
                        header.style.opacity = '1';
                        header.style.pointerEvents = 'auto';
                        logoContainer.style.opacity = '0';
                    }
                }

                const campaignHint = document.getElementById('campaign-hint');
                if (campaignHint) {
                    campaignHint.style.opacity = (scrollProgress >= 0.14 && scrollProgress <= 0.26) ? '1' : '0';
                }

                const text1 = document.getElementById('intro-text-1');
                if (scrollProgress < 0.03) {
                    if (text1) text1.style.opacity = (1 - (scrollProgress / 0.03)).toString();
                } else {
                    if (text1) text1.style.opacity = '0';
                }

                // Portrait Mode Aspect Correction
                const isPortrait = window.innerHeight > window.innerWidth;
                let shelfBaseZ = isPortrait ? 18 : 12;

                let targetCamZ = 45; 
                let targetCamY = 0;
                let targetCamX = 0;
                let targetTunnelOpacity = 1.0;
                let targetTunnelScale = 1;

                if (scrollProgress < 0.15) {
                    const localProg = scrollProgress / 0.15;
                    const camEase = 1 - Math.pow(1 - localProg, 3); 
                    targetCamZ = 45 - (camEase * (45 - shelfBaseZ)); 
                    targetTunnelScale = 1 + (camEase * 40); 
                    const dotScale = 1 + Math.pow(localProg, 4) * 160;
                    dotMesh.scale.set(dotScale, dotScale, 1);
                    targetTunnelOpacity = scrollProgress > 0.03 ? 1.0 - Math.pow((scrollProgress - 0.03) / 0.12, 2) : 1.0;
                } 
                else if (scrollProgress >= 0.15 && scrollProgress < 0.3) {
                    targetCamZ = shelfBaseZ;
                    targetTunnelOpacity = 0;
                    dotMesh.scale.set(0.001, 0.001, 1);
                }
                else if (scrollProgress >= 0.3 && scrollProgress < 0.75) {
                    const localProg = (scrollProgress - 0.3) / 0.45;
                    const easeProg = localProg < 0.5 ? 2 * localProg * localProg : 1 - Math.pow(-2 * localProg + 2, 2) / 2;
                    targetCamZ = shelfBaseZ - (easeProg * (132 + shelfBaseZ)); 
                } 
                else if (scrollProgress >= 0.75 && scrollProgress < 0.85) {
                    const localProg = (scrollProgress - 0.75) / 0.10;
                    targetCamZ = -120 - (localProg * 6); 
                } 
                else {
                    targetCamZ = -126;
                }

                camera.position.z = lerp(camera.position.z, targetCamZ, 0.06);
                camera.lookAt(0, 0, camera.position.z - 20);

                introBgPlane.scale.y = lerp(introBgPlane.scale.y, targetTunnelScale, 0.1);
                introBgPlane.material.opacity = lerp(introBgPlane.material.opacity, targetTunnelOpacity, 0.1);

                let targetShelfOpacity = (scrollProgress > 0.05) ? 1 : 0;
                plasticMaterial.opacity = lerp(plasticMaterial.opacity, targetShelfOpacity, 0.05);
                shelfMat.opacity = lerp(shelfMat.opacity, targetShelfOpacity, 0.05);
                cassettes.forEach(c => {
                    if(c.material[0]) c.material[0].opacity = plasticMaterial.opacity;
                    if(c.material[4]) c.material[4].opacity = plasticMaterial.opacity;
                });

                cassettes.forEach((cassette, idx) => {
                    const ud = cassette.userData;
                    let targetX = ud.baseX;
                    let targetZ = ud.baseZ;
                    let targetRotY = ud.baseRotY;

                    if (scrollProgress >= 0.28) {
                        const partProg = Math.min(1, (scrollProgress - 0.28) * 6); 
                        let dir = Math.sign(ud.baseX) || (idx % 2 === 0 ? 1 : -1);
                        targetX = ud.baseX + (dir * partProg * 15);
                        targetRotY = ud.baseRotY + (dir * partProg * Math.PI / 2); 
                        ud.state = 'idle';
                    } else {
                        if (ud.state === 'active') {
                            targetZ = isPortrait ? 5.5 : 3.5;
                            targetRotY = -Math.PI / 2;
                        } else if (ud.state === 'hover') {
                            targetZ = 0.5; 
                        }
                    }
                    cassette.position.x = lerp(cassette.position.x, targetX, 0.1);
                    cassette.position.z = lerp(cassette.position.z, targetZ, 0.1);
                    cassette.rotation.y = lerp(cassette.rotation.y, targetRotY, 0.1);
                });
                
                shelfMesh.position.y = lerp(shelfMesh.position.y, scrollProgress >= 0.28 ? -10 : -2.2, 0.1);

                textPlanes.forEach((item, index) => {
                    item.targetY = item.baseY + Math.sin(elapsedTime * 1.2 + index) * 0.5;
                    item.mesh.position.y = lerp(item.mesh.position.y, item.targetY, 0.1);
                    
                    if (scrollProgress < 0.3) {
                        item.mesh.material.opacity = lerp(item.mesh.material.opacity, 0, 0.2);
                    } else {
                        const dist = item.mesh.position.z - camera.position.z;
                        item.mesh.material.opacity = (dist > 2 || dist < -35) ? lerp(item.mesh.material.opacity, 0, 0.1) : lerp(item.mesh.material.opacity, 1, 0.05);
                    }
                });

                let isWarping = scrollProgress >= 0.28 && scrollProgress < 0.65;
                starMat.opacity = lerp(starMat.opacity, isWarping ? 0.6 : (scrollProgress >= 0.28 ? 0.3 : 0), 0.05);
                
                let baseWarpSpeed = isWarping ? 0.3 : 0.005; 
                let activeWarpSpeed = baseWarpSpeed + (isWarping ? (scrollDelta * 50) : 0);
                currentStarStretch = lerp(currentStarStretch, isWarping ? (1 + activeWarpSpeed * 40) : 1, 0.1);

                if (starMat.opacity > 0.01) {
                    for(let i=0; i<starCount; i++) {
                        let data = starData[i];
                        data.z += (data.speed * (isWarping ? 1 : 0.2)) + activeWarpSpeed; 
                        if (data.z > camera.position.z) data.z = camera.position.z - 200; 
                        dummy.position.set(data.x, data.y, data.z);
                        dummy.scale.set(1, 1, currentStarStretch); 
                        dummy.updateMatrix();
                        starMesh.setMatrixAt(i, dummy.matrix);
                    }
                    starMesh.instanceMatrix.needsUpdate = true;
                }

                const distToFinal = pitchPlane.position.z - camera.position.z;
                if (Math.abs(distToFinal) < 60) {
                    pitchPlane.material.opacity = lerp(pitchPlane.material.opacity, 0.7 + Math.sin(elapsedTime * 2) * 0.3, 0.05);
                    const scaleFactor = (scrollProgress > 0.75) ? (1 + ((scrollProgress - 0.75) * 0.3)) : 1.0;
                    pitchPlane.scale.set(pitchPlane.userData.baseScaleX * scaleFactor, pitchPlane.userData.baseScaleY * scaleFactor, scaleFactor);
                } else {
                    pitchPlane.material.opacity = lerp(pitchPlane.material.opacity, 0, 0.1);
                }

                renderer.render(scene, camera);
            }

            animate();
        };
    </script>
</body>
</html>
